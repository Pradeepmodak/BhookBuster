name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Build Auth Service
        working-directory: services/auth
        run: |
          npm ci || npm install
          npm run build

      - name: Build Restaurant Service
        working-directory: services/restaurant
        run: |
          npm ci || npm install
          npm run build

      - name: Build Rider Service
        working-directory: services/rider
        run: |
          npm ci || npm install
          npm run build

      - name: Build Admin Service
        working-directory: services/admin
        run: |
          npm ci || npm install
          npm run build

      - name: Build Realtime Service
        working-directory: services/realtime
        run: |
          npm ci || npm install
          npm run build

      - name: Build Utils Service
        working-directory: services/utils
        run: |
          npm ci || npm install
          npm run build

      - name: Build AI Gateway Service
        working-directory: services/ai-gateway
        run: |
          npm ci || npm install
          npm run build

      - name: Validate Docker Build — Admin
        run: docker build -t bhookbuster-admin ./services/admin

      - name: Validate Docker Build — Restaurant
        run: docker build -t bhookbuster-restaurant ./services/restaurant

      - name: Validate Docker Build — Rider
        run: docker build -t bhookbuster-rider ./services/rider

  deploy:
    name: Deploy to Render & Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Deploy Frontend to Vercel (Explicit CLI — no GUI dependency) ────
      # Uses Vercel CLI to deploy from the /frontend subdirectory.
      # This bypasses Vercel's GitHub integration entirely, meaning
      # the Root Directory setting in the Vercel dashboard no longer matters.
      #
      # Required GitHub Secrets:
      #   VERCEL_TOKEN     → Vercel account token (vercel.com → Settings → Tokens)
      #   VERCEL_ORG_ID    → Found in vercel.json after running `vercel link`
      #   VERCEL_PROJECT_ID → Found in vercel.json after running `vercel link`
      - name: Deploy Frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is not configured in GitHub Secrets."
            echo "Skipping Vercel CLI deploy step. Vercel Git Integration handles automatic deployment via root vercel.json."
          else
            npm install -g vercel@latest
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          fi

      # ── Deploy All Backend Services to Render ───────────────────────────
      - name: Deploy Auth Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}"

      - name: Deploy Restaurant Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_RESTAURANT }}"

      - name: Deploy Rider Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_RIDER }}"

      - name: Deploy Admin Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"

      - name: Deploy Realtime Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_REALTIME }}"

      - name: Deploy Utils Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_UTILS }}"

      - name: Deploy AI Gateway Service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_AI_GATEWAY }}"