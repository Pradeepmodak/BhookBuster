services:
  - type: web
    name: admin
    env: node
    plan: free
    rootDir: services/admin
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 2000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: BhookBuster

  - type: web
    name: auth
    env: node
    plan: free
    rootDir: services/auth
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: realtime
    env: node
    plan: free
    rootDir: services/realtime
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: INTERNAL_SERVICE_KEY
        sync: false

  - type: web
    name: restaurant
    env: node
    plan: free
    rootDir: services/restaurant
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_KEY
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: UTILS_SERVICE
        sync: false
      - key: REALTIME_SERVICE
        sync: false
      - key: PAYMENT_QUEUE
        value: payment_event
      - key: RIDER_QUEUE
        value: rider_queue
      - key: ORDER_READY_QUEUE
        value: order_ready_queue
      - key: USER_EVENT_QUEUE
        value: user_event_queue
      - key: AI_GATEWAY_URL
        sync: false
      - key: GATEWAY_HMAC_SECRET
        sync: false

  - type: web
    name: rider
    env: node
    plan: free
    rootDir: services/rider
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_KEY
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: RESTAURANT_SERVICE
        sync: false
      - key: REALTIME_SERVICE
        sync: false
      - key: UTILS_SERVICE_URL
        sync: false
      - key: RIDER_QUEUE
        value: rider_queue
      - key: ORDER_READY_QUEUE
        value: order_ready_queue

  - type: web
    name: utils
    env: node
    plan: free
    rootDir: services/utils
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 7000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET_KEY
        sync: false
      - key: INTERNAL_SERVICE_KEY
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: RESTAURANT_SERVICE
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_KEY_ID
        sync: false
      - key: PAYMENT_QUEUE
        value: payment_event

  - type: web
    name: ai-gateway
    env: node
    plan: free
    rootDir: services/ai-gateway
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5010
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GATEWAY_HMAC_SECRET
        sync: false
